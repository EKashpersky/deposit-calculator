<mat-card class="p-[20px] w-min">
  <form [formGroup]="calculatorForm">
    <mat-form-field>
      <mat-label>{{ 'calculator.initial_deposit' | translate }}</mat-label>
      <input matInput inputmode="numeric" formControlName="initialDeposit" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>{{ 'calculator.monthly_deposit' | translate }}</mat-label>
      <input matInput inputmode="numeric" formControlName="monthlyDeposit" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>{{ 'calculator.annual_interest' | translate }}</mat-label>
      <input matInput inputmode="numeric" formControlName="annualInterest" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>{{ 'calculator.deposit_duration' | translate }}</mat-label>
      <input matInput inputmode="numeric" formControlName="monthsDuration" />
    </mat-form-field>
  </form>

  @if (result().gross > 0) {
    {{ result().gross }}
  } @else {
    <p>Enter minimal parameters</p>
  }
</mat-card>
